<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <title>Offline | HWS Workspace</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f4f4f4;
        color: #111111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border: 1px solid #dfdfdf;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
      }

      p {
        margin: 0;
        color: #6f6f6f;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Je bent offline</h1>
      <p>Maak opnieuw verbinding om de HWS Workspace te openen en opgeslagen gegevens te synchroniseren.</p>
    </main>
  </body>
</html>
