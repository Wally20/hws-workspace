<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ legacy_csrf_token }}">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="HWS Workspace">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Inloggen | HWS Voetbalschool Workspace</title>
    <link rel="icon" type="image/png" href="../static/assets/hws-logo.png">
    <link rel="apple-touch-icon" href="../static/assets/hws-logo.png">
    <link rel="manifest" href="/manifest.webmanifest?v={{ asset_version }}">
    <link rel="stylesheet" href="../static/styles.css?v={{ asset_version }}">
  </head>
  <body class="login-body">
    <div class="login-background" aria-hidden="true">
      <span class="login-background-slide login-background-slide-1"></span>
      <span class="login-background-slide login-background-slide-2"></span>
      <span class="login-background-slide login-background-slide-3"></span>
      <span class="login-background-slide login-background-slide-4"></span>
      <span class="login-background-overlay"></span>
    </div>
    <main class="login-shell">
      <section class="login-card">
        <div class="login-brand">
          <img src="../static/assets/hws-logo.png" alt="HWS Voetbalschool logo">
          <div class="brand-copy brand-copy-login">
            <p class="brand-subtitle">WORKSPACE</p>
          </div>
        </div>

        <div class="login-copy">
          <h1>Inloggen</h1>
        </div>

        {% if login_error %}
          <section class="notice trainers-notice trainers-notice-error">{{ login_error }}</section>
        {% endif %}

        <form class="agenda-form" method="post" action="/login">
          <input type="hidden" name="csrf_token" value="{{ legacy_csrf_token }}">
          <input type="hidden" name="next" value="{{ next_path }}">

          <label class="field">
            <span>E-mailadres</span>
            <input type="email" name="email" autocomplete="username" required>
          </label>

          <label class="field">
            <span>Wachtwoord</span>
            <input type="password" name="password" autocomplete="current-password" required>
          </label>

          <div class="agenda-form-actions">
            <button type="submit" class="subtle-button subtle-button-strong">Inloggen</button>
          </div>
        </form>
      </section>
    </main>
    <script nonce="{{ csp_nonce }}" src="../static/base.js?v={{ asset_version }}" defer></script>
  </body>
</html>
